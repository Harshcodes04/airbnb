<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Home</title>
    <link rel="stylesheet" href="/css/output.css" />
  </head>
  <body class="bg-gray-50 flex flex-col min-h-screen font-sans">
    <nav class="bg-[#FF385C] border-b border-[#d50027]">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex items-center">
            <a href="/" class="text-2xl font-bold text-white">airbnb clone</a>
          </div>
          <div class="flex items-center space-x-4">
            <a href="/" class="text-white hover:text-gray-200 font-medium"
              >Home</a
            >
            <a
              href="/host/add-home"
              class="text-white hover:text-gray-200 font-medium"
              >Add Home</a
            >
          </div>
        </div>
      </div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-lg">
      <div class="bg-white p-8 rounded-lg shadow-sm border border-gray-100">
        <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">
          Add a New Home
        </h1>

        <form action="/host/add-home" method="POST" class="space-y-4">
          <div>
            <label
              for="homeName"
              class="block text-sm font-medium text-gray-700 mb-1"
              >Home Name</label
            >
            <input
              type="text"
              name="houseName"
              id="houseName"
              placeholder="Enter home name"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-airbnb focus:border-transparent"
            />
          </div>

          <button
            type="submit"
            class="w-full bg-black hover:bg-[#d50027] text-white font-bold py-2 px-4 rounded-md transition duration-200"
          >
            Add Home
          </button>
        </form>
      </div>
    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto">
      <div class="max-w-7xl mx-auto py-6 px-4">
        <p class="text-center text-gray-400 text-sm">
          &copy; 2025 Airbnb Clone
        </p>
      </div>
    </footer>
  </body>
</html>
